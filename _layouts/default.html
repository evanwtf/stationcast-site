<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — StationCast</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- OpenGraph -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="StationCast">
  <meta property="og:title"       content="{{ page.title }} — StationCast">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url"         content="{{ site.url }}{{ page.url }}">
  <meta property="og:image"       content="{{ site.url }}/assets/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt"   content="StationCast — Weather that feels like a place">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ page.title }} — StationCast">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image"       content="{{ site.url }}/assets/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.10);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-inset: rgba(255, 255, 255, 0.18);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.72);
      --text-tertiary: rgba(255, 255, 255, 0.45);
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      background: linear-gradient(165deg, #152d4a 0%, #1c5280 42%, #3a80b8 80%, #5499cc 100%);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: -15%;
      right: -5%;
      width: 55vw;
      height: 55vw;
      max-width: 500px;
      max-height: 500px;
      background: radial-gradient(circle, rgba(120, 190, 255, 0.18) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* — Nav — */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 26px 0 28px;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: white;
      text-decoration: none;
    }

    nav a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
    }
    nav a:hover { color: white; }

    /* — Glass content card — */
    .content-card {
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 var(--glass-inset);
      padding: 40px 44px;
    }

    @media (max-width: 560px) {
      .content-card { padding: 28px 22px; }
    }

    /* — Typography — */
    .content-card h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
      color: white;
    }

    .page-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .content-card h2 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: white;
      margin: 32px 0 10px;
    }

    .content-card h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      margin: 22px 0 8px;
    }

    .content-card p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .content-card ul,
    .content-card ol {
      margin: 0 0 14px 20px;
    }

    .content-card li {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .content-card strong {
      font-weight: 600;
      color: white;
    }

    .content-card a {
      color: rgba(160, 210, 255, 0.9);
      text-decoration: none;
    }
    .content-card a:hover {
      color: white;
      text-decoration: underline;
    }

    .content-card hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      margin: 28px 0;
    }

    .content-card code {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 5px;
      padding: 2px 6px;
      font-family: "SF Mono", "Monaco", "Courier New", monospace;
      font-size: 13px;
    }

    /* — Footer — */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0 0;
      margin-top: 24px;
    }

    footer a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
    }
    footer a:hover { color: white; }

    .footer-copy {
      font-size: 12px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="wordmark">StationCast</a>
      <a href="/">← Home</a>
    </nav>

    <div class="content-card">
      {{ content }}
    </div>

    <footer>
      <div style="display:flex;gap:20px;">
        <a href="/faq">FAQ</a>
        <a href="/privacy-policy">Privacy Policy</a>
      </div>
      <span class="footer-copy">&copy; 2026 StationCast</span>
    </footer>
  </div>
</body>
</html>
